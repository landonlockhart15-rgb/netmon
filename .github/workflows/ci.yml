name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend validation (Windows)
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt
      - name: Compile and run all backend suites
        shell: powershell
        run: .\validate.ps1

  frontend:
    name: Frontend build and lint baseline
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Check visible lint debt does not regress
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          .\tools\check_frontend_lint.ps1 -ReportPath "$PWD\artifacts\eslint.json"
      - name: Upload complete ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: artifacts/eslint.json
          if-no-files-found: warn
      - name: Build production frontend
        working-directory: frontend
        run: npm run build
      - name: Require committed production assets to be current
        shell: powershell
        run: git diff --exit-code -- static
