name: Release build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  installer:
    name: Build unsigned Windows installer
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Create build environment
        shell: powershell
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --disable-pip-version-check -r requirements.txt -r requirements-build.txt
          choco install innosetup --no-progress -y
      - name: Build and validate installer
        shell: powershell
        run: .\tools\build_installer.ps1
      - name: Upload installer and checksum
        uses: actions/upload-artifact@v4
        with:
          name: netmon-installer
          path: |
            installer/Output/NetMon-Setup-*.exe
            installer/Output/NetMon-Setup-*.exe.sha256
          if-no-files-found: error
